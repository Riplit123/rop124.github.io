<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Башенки: Замковая оборона</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a2a32;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #1f3a3f;
            padding: 24px;
            border-radius: 32px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #5f8b6f;
        }
        .canvas-panel {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas {
            display: block;
            background: #2d4a3b;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #6a8e7a, 0 10px 15px -5px #0f1e1a;
            cursor: crosshair;
            width: 600px;
            height: 600px;
            border: none;
        }
        .info-panel {
            background: #1e3b30;
            border-radius: 24px;
            padding: 20px;
            min-width: 220px;
            color: #d4e6d1;
            box-shadow: inset 0 0 0 2px #3f6b53, 0 10px 15px -5px #0b1c16;
            border: 1px solid #a2c2aa;
        }
        .stat {
            background: #173129;
            border-radius: 40px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #5a9776;
            box-shadow: inset 0 2px 5px #0c1f1a;
        }
        .stat span {
            background: #2c5543;
            padding: 8px 18px;
            border-radius: 40px;
            color: #f0ffe6;
            font-size: 2rem;
            line-height: 1;
            border: 1px solid #95bda0;
            text-shadow: 2px 2px 0 #163a28;
        }
        .wave-info {
            background: #203d33;
            border-radius: 30px;
            padding: 16px;
            text-align: center;
            font-size: 1.3rem;
            border: 1px solid #679d7c;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        button {
            background: #365f49;
            border: none;
            border-radius: 60px;
            padding: 16px 12px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #edffe3;
            border-bottom: 6px solid #1a3a2a;
            border-right: 3px solid #1e402e;
            transition: 0.07s;
            cursor: pointer;
            box-shadow: 0 7px 0 #1b3627;
            letter-spacing: 1px;
        }
        button:hover {
            background: #428a5e;
            transform: translateY(-2px);
            border-bottom-width: 8px;
        }
        button:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #1b3627;
        }
        button:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            border-bottom-width: 3px;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .message {
            background: #262b1f;
            border-radius: 30px;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            color: #ffeeaa;
            border: 2px solid #dbb05c;
            margin-top: 16px;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            color: #74967c;
            text-align: center;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-panel">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="info-panel">
            <div class="stat">
                💰 <span id="moneyDisplay">200</span>
            </div>
            <div class="stat">
                ❤️ <span id="livesDisplay">10</span>
            </div>
            <div class="wave-info">
                🌊 ВОЛНА <span id="waveDisplay">0</span>/5
            </div>
            <div class="button-group">
                <button id="startWaveBtn">⚔️ СТАРТ</button>
                <button id="restartBtn">🔄 ПЕРЕЗАПУСК</button>
            </div>
            <div id="statusMessage" class="message">🏰 Стройте замки рядом с дорогой</div>
        </div>
    </div>
    <div class="footer">
        🛡️ Клетки у пути — стройка (100💰)  |  Враг в конце ❤️ -1  |  +50💰 за убийство
    </div>
</div>
<script>
(function() {
    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 60;          // пикселей
    const GRID_SIZE = 10;           // 10x10
    const CANVAS_SIZE = 600;

    // Фиксированный путь (клетки)
    const PATH_CELLS = [
        {x:0, y:0}, {x:0, y:1}, {x:0, y:2}, {x:1, y:2}, {x:2, y:2}, {x:2, y:3}, {x:2, y:4},
        {x:3, y:4}, {x:4, y:4}, {x:4, y:5}, {x:4, y:6}, {x:5, y:6}, {x:6, y:6}, {x:6, y:7},
        {x:6, y:8}, {x:7, y:8}, {x:8, y:8}, {x:8, y:9}, {x:9, y:9}
    ];

    // Множество клеток пути для быстрой проверки
    const pathSet = new Set(PATH_CELLS.map(p => `${p.x},${p.y}`));

    // Клетки, доступные для строительства (рядом с путём, но не на пути)
    let buildableCells = [];

    // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
    let money = 200;
    let lives = 10;
    let currentWave = 0;            // 0 — ещё не начали, волны 1..5
    const MAX_WAVES = 5;
    let gameStatus = 'playing';      // 'playing', 'won', 'lost'
    let waveActive = false;          // идёт ли сейчас волна (спавн или есть живые враги)
    let waveStartTime = 0;
    let waveEnemiesToSpawn = [];     // очередь спавна { delay, enemyData }

    // Динамические сущности
    let enemies = [];
    let towers = [];

    // Временные метки для атак (перезарядка)
    let lastTimestamp = 0;

    // DOM элементы
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const moneySpan = document.getElementById('moneyDisplay');
    const livesSpan = document.getElementById('livesDisplay');
    const waveSpan = document.getElementById('waveDisplay');
    const statusMsg = document.getElementById('statusMessage');
    const startWaveBtn = document.getElementById('startWaveBtn');
    const restartBtn = document.getElementById('restartBtn');

    // ---------- ПРЕДВАРИТЕЛЬНЫЕ РАСЧЁТЫ ----------
    // Перевод пути в пиксельные координаты (центры клеток)
    const waypoints = PATH_CELLS.map(cell => ({
        x: cell.x * CELL_SIZE + CELL_SIZE/2,
        y: cell.y * CELL_SIZE + CELL_SIZE/2
    }));

    // Вычисляем строительные клетки
    function computeBuildableCells() {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        const buildable = [];
        for (let row = 0; row < GRID_SIZE; row++) {
            for (let col = 0; col < GRID_SIZE; col++) {
                const key = `${col},${row}`;
                if (pathSet.has(key)) continue; // нельзя строить на пути
                // проверяем соседей
                let hasPathNeighbor = false;
                for (let [dx, dy] of dirs) {
                    const nx = col + dx, ny = row + dy;
                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                        if (pathSet.has(`${nx},${ny}`)) {
                            hasPathNeighbor = true;
                            break;
                        }
                    }
                }
                if (hasPathNeighbor) buildable.push({x: col, y: row});
            }
        }
        return buildable;
    }
    buildableCells = computeBuildableCells();

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function updateUI() {
        moneySpan.innerText = money;
        livesSpan.innerText = lives;
        waveSpan.innerText = currentWave + (gameStatus === 'won' ? ' (победа)' : '');
        if (gameStatus === 'lost') statusMsg.innerText = '💔 ВЫ ПРОИГРАЛИ... Перезапустите';
        else if (gameStatus === 'won') statusMsg.innerText = '🏆 ПОБЕДА! Все волны отражены';
        else if (waveActive) statusMsg.innerText = '⚡ Враги атакуют!';
        else statusMsg.innerText = '🛡️ Стройте башни и начинайте волну';
    }

    // Сброс игры (перезапуск)
    function restartGame() {
        money = 200;
        lives = 10;
        currentWave = 0;
        gameStatus = 'playing';
        waveActive = false;
        enemies = [];
        towers = [];
        waveEnemiesToSpawn = [];
        updateUI();
        draw(); // перерисовать
    }

    // Создание врага заданной волны
    function createEnemyForWave(waveIdx) {
        const baseHealth = 15 + waveIdx * 10;  // 1:25, 2:35, 3:45, 4:55, 5:65
        const health = baseHealth;
        const speed = 40; // пикселей в секунду
        const reward = 50;
        return {
            waypoints: [...waypoints], // копия пути
            targetIdx: 1,              // индекс следующей точки (0 - стартовая)
            x: waypoints[0].x,
            y: waypoints[0].y,
            health: health,
            maxHealth: health,
            speed: speed,
            reward: reward,
            active: true
        };
    }

    // Запуск следующей волны
    function startWave() {
        if (gameStatus !== 'playing') return;
        if (waveActive) return; // уже идёт волна
        if (currentWave >= MAX_WAVES) {
            gameStatus = 'won';
            updateUI();
            return;
        }

        currentWave++;
        if (currentWave > MAX_WAVES) {
            gameStatus = 'won';
            updateUI();
            return;
        }

        // Формируем очередь спавна
        const waveSize = 3 + (currentWave-1) * 2; // 3,5,7,9,11
        const spawnDelay = 600; // мс между врагами
        waveEnemiesToSpawn = [];
        for (let i = 0; i < waveSize; i++) {
            const delay = i * spawnDelay;
            waveEnemiesToSpawn.push({
                delay: delay,
                enemy: createEnemyForWave(currentWave)
            });
        }

        waveActive = true;
        waveStartTime = performance.now();
        updateUI();
    }

    // Проверка окончания волны (нет врагов и спавнов)
    function checkWaveCompletion() {
        if (!waveActive) return;
        if (enemies.length === 0 && waveEnemiesToSpawn.length === 0) {
            waveActive = false;
            if (currentWave >= MAX_WAVES && gameStatus === 'playing') {
                gameStatus = 'won';
            }
            updateUI();
        }
    }

    // Построить башню (вызывается при клике)
    function tryPlaceTower(col, row) {
        if (gameStatus !== 'playing') return false;
        // можно ли строить на этой клетке
        const canBuild = buildableCells.some(cell => cell.x === col && cell.y === row);
        if (!canBuild) return false;
        // нет ли уже башни
        if (towers.some(t => t.col === col && t.row === row)) return false;
        if (money < 100) return false;

        // строим
        towers.push({
            col, row,
            x: col * CELL_SIZE + CELL_SIZE/2,
            y: row * CELL_SIZE + CELL_SIZE/2,
            lastShot: 0,             // миллисекунды (относительно общего времени)
            cooldown: 500,            // мс
            damage: 12,
            range: 130                // пикселей (чуть больше 2 клеток)
        });
        money -= 100;
        updateUI();
        return true;
    }

    // ---------- АТАКА БАШЕН ----------
    function updateTowers(now) {
        for (let tower of towers) {
            // время с последнего выстрела
            if (now - tower.lastShot >= tower.cooldown) {
                // ищем ближайшего врага в радиусе
                let closestEnemy = null;
                let minDist = Infinity;
                for (let enemy of enemies) {
                    const dx = enemy.x - tower.x;
                    const dy = enemy.y - tower.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist <= tower.range && dist < minDist) {
                        minDist = dist;
                        closestEnemy = enemy;
                    }
                }
                if (closestEnemy) {
                    // стреляем
                    closestEnemy.health -= tower.damage;
                    tower.lastShot = now;
                    // если враг умер
                    if (closestEnemy.health <= 0) {
                        // удалим позже в updateEnemies, но сейчас отметим
                        // деньги начислим при удалении
                    }
                }
            }
        }
    }

    // ---------- ДВИЖЕНИЕ ВРАГОВ И УРОН ----------
    function updateEnemies(deltaSec, now) {
        // Движение и проверка достижения конца
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (e.health <= 0) {
                // убит
                money += e.reward;
                enemies.splice(i, 1);
                continue;
            }

            const target = e.waypoints[e.targetIdx];
            if (!target) {
                // дошли до конца (ошибка, но удалим)
                enemies.splice(i, 1);
                lives--;
                if (lives < 0) lives = 0;
                continue;
            }

            // вектор к цели
            const dx = target.x - e.x;
            const dy = target.y - e.y;
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < 2) { // достиг точки
                e.x = target.x;
                e.y = target.y;
                e.targetIdx++;
                if (e.targetIdx >= e.waypoints.length) {
                    // враг дошёл до конца
                    enemies.splice(i, 1);
                    lives--;
                    if (lives < 0) lives = 0;
                    continue;
                }
            } else {
                // двигаемся
                const move = e.speed * deltaSec;
                const normX = dx / distance;
                const normY = dy / distance;
                e.x += normX * move;
                e.y += normY * move;
            }
        }

        // Проверка поражения
        if (lives <= 0) {
            gameStatus = 'lost';
            waveActive = false;
            waveEnemiesToSpawn = []; // отключаем спавн
            enemies = []; // убираем врагов
        }
    }

    // Спавн врагов по расписанию
    function updateSpawning(now) {
        if (!waveActive || gameStatus !== 'playing') return;
        if (waveEnemiesToSpawn.length === 0) return;

        const elapsed = now - waveStartTime;
        // копируем массив, чтобы удалять по индексу (проходим с конца)
        for (let i = waveEnemiesToSpawn.length - 1; i >= 0; i--) {
            if (elapsed >= waveEnemiesToSpawn[i].delay) {
                // создаём врага
                const newEnemy = { ...waveEnemiesToSpawn[i].enemy }; // копия
                newEnemy.waypoints = [...waypoints]; // свежий путь
                newEnemy.x = waypoints[0].x;
                newEnemy.y = waypoints[0].y;
                newEnemy.targetIdx = 1;
                enemies.push(newEnemy);
                waveEnemiesToSpawn.splice(i, 1);
            }
        }
    }

    // ---------- ОТРИСОВКА ----------
    function draw() {
        ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

        // Рисуем сетку
        ctx.strokeStyle = '#5d8b6d';
        ctx.lineWidth = 1;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.strokeStyle = '#55806b';
            ctx.lineWidth = 1;
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
            ctx.stroke();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
            ctx.stroke();
        }

        // Заливка пути (песок)
        PATH_CELLS.forEach(cell => {
            ctx.fillStyle = '#b5926a';
            ctx.fillRect(cell.x * CELL_SIZE, cell.y * CELL_SIZE, CELL_SIZE-1, CELL_SIZE-1);
        });

        // Заливка строительных клеток
        buildableCells.forEach(cell => {
            ctx.fillStyle = '#3f8865';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(cell.x * CELL_SIZE, cell.y * CELL_SIZE, CELL_SIZE-1, CELL_SIZE-1);
            ctx.globalAlpha = 1.0;
        });

        // Рисуем башни (замки)
        towers.forEach(t => {
            // основание
            ctx.fillStyle = '#6f4e37';
            ctx.shadowColor = '#dbb05c';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 20, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#c49a6c';
            ctx.beginPath();
            ctx.arc(t.x-4, t.y-6, 8, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#e2c28b';
            ctx.beginPath();
            ctx.arc(t.x+6, t.y-8, 6, 0, 2*Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Рисуем врагов
        enemies.forEach(e => {
            const healthPercent = e.health / e.maxHealth;
            ctx.fillStyle = '#712e2e';
            ctx.shadowColor = '#490000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 18, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#f5c542';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(e.x-4, e.y-5, 7, 0, 2*Math.PI);
            ctx.fill();
            // полоска здоровья
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#111';
            ctx.fillRect(e.x-20, e.y-28, 40, 6);
            ctx.fillStyle = '#3eff9e';
            ctx.fillRect(e.x-20, e.y-28, 40 * healthPercent, 5);
        });

        // Декорации входа/выхода
        ctx.font = 'bold 20px "Segoe UI"';
        ctx.fillStyle = '#dcd7ba';
        ctx.fillText('🚪', 5, 35);
        ctx.fillText('🏁', 535, 575);
    }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function gameLoop(now) {
        if (!lastTimestamp) {
            lastTimestamp = now;
            requestAnimationFrame(gameLoop);
            return;
        }

        const deltaMs = Math.min(100, now - lastTimestamp); // ограничим скачки
        const deltaSec = deltaMs / 1000;
        lastTimestamp = now;

        if (gameStatus === 'playing') {
            // Спавн врагов
            updateSpawning(now);
            // Атаки башен
            updateTowers(now);
            // Движение врагов (и начисление денег/жизней)
            updateEnemies(deltaSec, now);
            // Проверка завершения волны
            checkWaveCompletion();
            updateUI();
        }

        draw();
        requestAnimationFrame(gameLoop);
    }

    // ---------- ОБРАБОТКА КЛИКА НА CANVAS ----------
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const col = Math.floor(mouseX / CELL_SIZE);
        const row = Math.floor(mouseY / CELL_SIZE);

        if (col >= 0 && col < GRID_SIZE && row >= 0 && row < GRID_SIZE) {
            tryPlaceTower(col, row);
        }
    });

    // КНОПКИ
    startWaveBtn.addEventListener('click', () => {
        if (gameStatus === 'playing' && !waveActive) {
            startWave();
        }
    });

    restartBtn.addEventListener('click', () => {
        restartGame();
    });

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function init() {
        restartGame(); // всё в исходное
        requestAnimationFrame(gameLoop);
    }

    init();
})();
</script>
</body>
</html>
